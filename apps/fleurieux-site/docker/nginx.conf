# docker/nginx.conf

# SEC-002/SEC-007 : zones de rate limiting (définies dans le contexte http)
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;

# NEW-001 : l'IP réelle est extraite par nginx depuis le proxy Docker
# Le conteneur app lit x-real-ip (positionné ci-dessous), pas x-forwarded-for (forgeable)
set_real_ip_from 172.0.0.0/8;
real_ip_header   X-Forwarded-For;

server {
    listen 80;
    server_name fleurieux.info www.fleurieux.info;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fleurieux.info www.fleurieux.info;

    ssl_certificate     /etc/letsencrypt/live/fleurieux.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fleurieux.info/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # SEC-015 : cipher suites modernes (Mozilla Intermediate 2024)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Cache statique Next.js
    location /_next/static/ {
        proxy_pass http://app:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SEC-002 : rate limiting strict sur les endpoints d'authentification
    location /api/auth/ {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SEC-007 : rate limiting sur les autres routes API
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SEC-009 : uploads avec headers de sécurité
    location /uploads/ {
        alias /var/www/uploads/;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'" always;
    }

    # App Next.js
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
